<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusConnect</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Minimal Navbar -->
    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="brand">Campus<span>Connect</span></a>
            <a href="index.html" class="btn btn-outline">Back to Home</a>
        </div>
    </nav>

    <!-- Center Login UI -->
    <div class="login-wrap">
        <div class="card login-card">
            
            <!-- Tabs (Visual only, no JS) -->
            <div class="login-tabs">
                <div class="login-tab active">Log In</div>
                <div class="login-tab">Register</div>
            </div>
            
            <h2 class="mb-4 text-center">Welcome Back!</h2>
            <p class="mb-8 text-center">Login with your college email to continue.</p>

            <form action="index.html" class="text-left">
                <div class="form-group">
                    <label for="email">College Email ID</label>
                    <input type="email" id="email" class="form-control" placeholder="e.g. rahul.s.cs22@college.edu" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                
                <div class="flex justify-between items-center mb-6 mt-4">
                    <label class="flex items-center gap-2" style="font-size: 0.9rem; color: var(--text-muted); cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="font-size: 0.9rem;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1rem;">Sign In</button>
            </form>

            <p class="mt-6 text-center" style="font-size: 0.9rem;">
                Don't have an account? <a href="#" style="font-weight: 600;">Create one here</a>.
            </p>
        </div>
    </div>

</body>
</html>
